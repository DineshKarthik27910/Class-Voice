{% extends "base.html" %}
{% block title %}Set New Password — Class Voice{% endblock %}
{% block content %}
<div class="auth-shell">
  <div class="auth-card">
    <h1 class="auth-heading">New Password</h1>
    <p class="auth-sub">Set a secure password for your college account.</p>
    
    <form method="POST" action="{{ url_for('reset_password') }}" class="auth-form">
      <label class="field-label" for="password">New Password</label>
      <input class="field-input" type="password" id="password" name="password" placeholder="••••••••" required autofocus />
      
      <label class="field-label" for="confirm_password">Confirm Password</label>
      <input class="field-input" type="password" id="confirm_password" name="confirm_password" placeholder="••••••••" required />
      
      <button class="btn-primary" type="submit" style="margin-top: 25px;">Change Password</button>
    </form>
  </div>
</div>
{% endblock %}
