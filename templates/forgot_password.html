{% extends "base.html" %}
{% block title %}Forgot Password — Class Voice{% endblock %}
{% block content %}
<div class="auth-shell">
  <div class="auth-card">
    <h1 class="auth-heading">Reset Password</h1>
    <p class="auth-sub">Enter your verified college email address to receive a recovery code.</p>
    
    <form method="POST" action="{{ url_for('forgot_password') }}" class="auth-form">
      <label class="field-label" for="email">College Email</label>
      <input class="field-input" type="email" id="email" name="email" placeholder="username@bl.students.amrita.edu" required autofocus />
      
      <button class="btn-primary" type="submit" style="margin-top: 25px;">Send Verification Code</button>
    </form>
    
    <p class="auth-footer" style="margin-top: 20px; text-align: center; font-size: 13px;">
      <a href="{{ url_for('login') }}">← Back to Sign In</a>
    </p>
  </div>
</div>
{% endblock %}
