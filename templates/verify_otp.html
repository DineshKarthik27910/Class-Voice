{% extends "base.html" %}
{% block title %}Verify Code — Class Voice{% endblock %}
{% block content %}
<div class="auth-shell">
  {% if dev_otp %}
    <div id="dev-otp" data-otp="{{ dev_otp }}" style="display: none;"></div>
  {% endif %}
  <div class="auth-card">
    <h1 class="auth-heading">Verify Email</h1>
    <p class="auth-sub">Enter the 6-digit verification code sent to <strong>{{ email }}</strong>.</p>
    
    <form method="POST" action="{{ url_for('verify_otp') }}" class="auth-form">
      <label class="field-label" for="code">Verification Code</label>
      <input class="field-input" type="text" id="code" name="code" placeholder="123456" pattern="\d{6}" maxlength="6" required autofocus autocomplete="one-time-code" style="text-align: center; font-size: 24px; letter-spacing: 8px;" />
      <span class="field-hint" style="display: block; font-size: 11px; margin-top: 4px; text-align: center; color: var(--text-3);">Code expires in 10 minutes.</span>
      
      <button class="btn-primary" type="submit" style="margin-top: 25px;">Verify & Continue</button>
    </form>
    
    <div class="auth-options" style="margin-top: 25px; text-align: center; font-size: 13px;">
      <p style="color: var(--text-3); margin-bottom: 8px;">Didn't get the code?</p>
      <button class="btn-reveal" onclick="window.location.reload();" style="padding: 6px 16px;">Request Code Again</button>
    </div>
  </div>
</div>
{% endblock %}
