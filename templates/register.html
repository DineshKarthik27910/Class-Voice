{% extends "base.html" %}
{% block title %}Register — Class Voice{% endblock %}
{% block content %}
<div class="auth-shell">
  <div class="auth-card">
    <h1 class="auth-heading">Create Account</h1>
    <p class="auth-sub">Register with your college email. You will receive a verification code.</p>
    
    <form method="POST" action="{{ url_for('register') }}" class="auth-form">
      <label class="field-label" for="name">Display Name</label>
      <input class="field-input" type="text" id="name" name="name" placeholder="John Doe" required autofocus />
      
      <label class="field-label" for="email">College Email</label>
      <input class="field-input" type="email" id="email" name="email" placeholder="username@bl.students.amrita.edu" required />
      <span class="field-hint" style="display: block; font-size: 11px; margin-top: 4px; color: var(--text-3);">Must be a @bl.students.amrita.edu address</span>
      
      <label class="field-label" for="password" style="margin-top: 15px;">Password</label>
      <input class="field-input" type="password" id="password" name="password" placeholder="••••••••" required />
      
      <button class="btn-primary" type="submit" style="margin-top: 25px;">Send Verification Code</button>
    </form>
    
    <p class="auth-footer" style="margin-top: 20px; text-align: center; font-size: 13px;">
      Already have an account? <a href="{{ url_for('login') }}">Sign In</a>
    </p>
  </div>
</div>
{% endblock %}
