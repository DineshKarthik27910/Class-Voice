services:
  - type: web
    name: classvoice
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class gthread --threads 100 --bind 0.0.0.0:$PORT --workers 1 app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: COLLEGE_DOMAIN
        value: bl.students.amrita.edu
      - key: FLASK_ENV
        value: production
